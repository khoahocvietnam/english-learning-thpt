<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lớp 10 - English THPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Copy toàn bộ CSS từ file index.html vào đây */
        /* Sau đó thêm CSS riêng cho trang lớp */
        .units-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .unit-card {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s;
            border: 3px solid transparent;
            background: linear-gradient(135deg, #fff5f5, #ffe0e0);
            border-color: #ff6b6b;
        }
        
        .unit-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255,107,107,0.3);
        }
        
        .unit-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #ff6b6b;
            padding-bottom: 0.5rem;
        }
        
        .unit-number {
            background: #ff6b6b;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        
        .exercise-list {
            list-style: none;
        }
        
        .exercise-list li {
            margin: 0.8rem 0;
        }
        
        .exercise-list a {
            color: #333;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .exercise-list a:hover {
            background: rgba(255,107,107,0.1);
            transform: translateX(10px);
            color: #ff6b6b;
        }
        
        .exercise-list i {
            width: 25px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <!-- Copy phần navbar từ index.html -->
    <!-- Sau đó thêm nội dung riêng -->
</body>
</html>
