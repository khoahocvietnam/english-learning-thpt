<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot AI - Học tiếng Anh</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .chat-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 20px;
        }
        
        .chat-box {
            height: 400px;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            overflow-y: auto;
            margin-bottom: 1rem;
            background: #f9f9f9;
        }
        
        .message {
            margin-bottom: 1rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            max-width: 70%;
        }
        
        .user-message {
            background: #3498db;
            color: white;
            margin-left: auto;
        }
        
        .bot-message {
            background: #e9ecef;
            color: #333;
        }
        
        .chat-input-area {
            display: flex;
            gap: 1rem;
        }
        
        #userInput {
            flex: 1;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
        }
        
        #sendBtn {
            padding: 0.8rem 2rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        #sendBtn:hover {
            background: #2980b9;
        }
        
        .grade-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            justify-content: center;
        }
        
        .grade-btn {
            padding: 0.5rem 1.5rem;
            border: 2px solid #3498db;
            background: white;
            color: #3498db;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .grade-btn.active {
            background: #3498db;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="logo">English THPT</h1>
            <ul class="nav-menu">
                <li><a href="../index.html">Trang chủ</a></li>
                <li><a href="lop10.html">Lớp 10</a></li>
                <li><a href="lop11.html">Lớp 11</a></li>
                <li><a href="lop12.html">Lớp 12</a></li>
                <li><a href="chatbot.html">Chatbot AI</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="chat-container">
            <h2 style="text-align: center; margin-bottom: 2rem;">🤖 Chatbot hỗ trợ học tiếng Anh</h2>
            
            <div class="grade-selector">
                <button class="grade-btn active" data-grade="10">Lớp 10</button>
                <button class="grade-btn" data-grade="11">Lớp 11</button>
                <button class="grade-btn" data-grade="12">Lớp 12</button>
            </div>
            
            <div class="chat-box" id="chatBox">
                <div class="message bot-message">
                    Xin chào! Tôi là trợ lý học tiếng Anh. Bạn cần giúp gì về bài học hôm nay?
                </div>
            </div>
            
            <div class="chat-input-area">
                <input type="text" id="userInput" placeholder="Nhập câu hỏi hoặc bài viết tiếng Anh của bạn...">
                <button id="sendBtn">Gửi</button>
            </div>
        </div>
    </main>

    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        let currentGrade = '10';
        
        // Xử lý chọn lớp
        document.querySelectorAll('.grade-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.grade-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentGrade = this.dataset.grade;
            });
        });
        
        // Xử lý gửi tin nhắn
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // Hiển thị tin nhắn user
            addMessage(message, 'user');
            userInput.value = '';
            
            // Hiển thị loading
            const loadingId = showLoading();
            
            try {
                // Gọi API chatbot (sẽ deploy lên Vercel sau)
                const response = await fetch('https://your-app.vercel.app/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        context: {
                            grade: currentGrade,
                            type: 'english_learning'
                        }
                    })
                });
                
                removeLoading(loadingId);
                
                if (response.ok) {
                    const data = await response.json();
                    addMessage(data.reply, 'bot');
                } else {
                    addMessage('Xin lỗi, có lỗi xảy ra. Vui lòng thử lại sau.', 'bot');
                }
            } catch (error) {
                removeLoading(loadingId);
                addMessage('Không thể kết nối đến server. Vui lòng thử lại.', 'bot');
                console.error('Error:', error);
            }
        }
        
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.classList.add('message', sender === 'user' ? 'user-message' : 'bot-message');
            messageDiv.textContent = text;
            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        function showLoading() {
            const id = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = id;
            loadingDiv.classList.add('message', 'bot-message');
            loadingDiv.textContent = 'Đang suy nghĩ...';
            chatBox.appendChild(loadingDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
            return id;
        }
        
        function removeLoading(id) {
            const loading = document.getElementById(id);
            if (loading) loading.remove();
        }
    </script>
</body>
</html>
