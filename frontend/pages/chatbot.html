<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot AI - Học tiếng Anh siêu vui</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chatbot-header {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1);
            color: white;
            padding: 3rem 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }
        
        .chatbot-header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
        }
        
        .chatbot-header p {
            font-size: 1.2rem;
            opacity: 0.95;
        }
        
        .chat-main-container {
            max-width: 1000px;
            margin: -50px auto 3rem;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }
        
        .chat-card {
            background: white;
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 5px solid transparent;
            background: linear-gradient(white, white) padding-box,
                        linear-gradient(135deg, #ff6b6b, #4ecdc4, #45b7d1, #f9ca24) border-box;
        }
        
        .chat-tabs {
            display: flex;
            background: linear-gradient(90deg, #f8f9fa, #e9ecef);
            padding: 1rem;
            gap: 1rem;
            border-bottom: 3px solid #dee2e6;
        }
        
        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 15px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
            color: #333;
            border: 2px solid #dee2e6;
        }
        
        .tab-btn.active {
            background: linear-gradient(90deg, #ff6b6b, #4ecdc4);
            color: white;
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,107,107,0.3);
        }
        
        .tab-btn i {
            margin-right: 8px;
        }
        
        .grade-selector-modern {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .grade-option {
            text-align: center;
            cursor: pointer;
        }
        
        .grade-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
            border: 4px solid transparent;
        }
        
        .grade-option.active .grade-circle {
            transform: scale(1.1);
            border-color: #f9ca24;
            box-shadow: 0 0 30px #f9ca24;
        }
        
        .grade-option:nth-child(1) .grade-circle { color: #ff6b6b; }
        .grade-option:nth-child(2) .grade-circle { color: #4ecdc4; }
        .grade-option:nth-child(3) .grade-circle { color: #45b7d1; }
        
        .grade-label {
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .chat-area {
            height: 450px;
            padding: 2rem;
            overflow-y: auto;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .message {
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            animation: popIn 0.3s ease;
        }
        
        @keyframes popIn {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .bot-avatar {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
        }
        
        .user-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .message-content {
            max-width: 70%;
            padding: 1rem 1.5rem;
            border-radius: 20px;
            position: relative;
            font-size: 1rem;
            line-height: 1.5;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .bot-message .message-content {
            background: white;
            border-bottom-left-radius: 5px;
        }
        
        .user-message .message-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-bottom-right-radius: 5px;
        }
        
        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-top: 0.3rem;
        }
        
        .chat-input-modern {
            display: flex;
            padding: 1.5rem;
            background: white;
            gap: 1rem;
            border-top: 3px solid #dee2e6;
        }
        
        .input-wrapper {
            flex: 1;
            position: relative;
        }
        
        #userInput {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border: 3px solid #e1e8f0;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        
        #userInput:focus {
            outline: none;
            border-color: #ff6b6b;
            box-shadow: 0 0 0 5px rgba(255,107,107,0.2);
        }
        
        #sendBtn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(255,107,107,0.3);
        }
        
        #sendBtn:hover {
            transform: scale(1.1) rotate(360deg);
        }
        
        .suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: #f8f9fa;
        }
        
        .suggestion-chip {
            padding: 0.5rem 1rem;
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 50px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .suggestion-chip:hover {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
        }
        
        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 1rem 1.5rem;
            background: white;
            border-radius: 20px;
            width: fit-content;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: typing 1s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        @media (max-width: 768px) {
            .grade-selector-modern {
                flex-wrap: wrap;
            }
            
            .message-content {
                max-width: 85%;
            }
        }
    </style>
</head>

                    <div class="message-content">
